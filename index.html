<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTD Macro Share</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg:#0d0b12;--surface:#13101c;--border:#2a2040;
    --accent:#c084fc;--text:#f0e8ff;--muted:#7c6f9a;
    --success:#86efac;--error:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 16px;background-image:radial-gradient(ellipse 60% 40% at 70% 10%,#3b0764 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 10% 80%,#1e1040 0%,transparent 60%)}
  .header{text-align:center;margin-bottom:48px}
  .logo{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;opacity:.8}
  h1{font-size:clamp(32px,6vw,56px);font-weight:800;background:linear-gradient(135deg,#e9d5ff 0%,#c084fc 50%,#e879f9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:12px}
  .sub{color:var(--muted);font-size:14px;font-family:'JetBrains Mono',monospace}
  .container{width:100%;max-width:680px;display:flex;flex-direction:column;gap:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
  .card-label{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .card-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  textarea{width:100%;background:#0a0812;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:14px;resize:vertical;min-height:120px;outline:none;transition:border-color .2s;line-height:1.6}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--muted)}
  input[type=text]{width:100%;background:#0a0812;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 14px;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--muted)}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:12px;letter-spacing:.5px}
  .btn-primary{background:linear-gradient(135deg,#9333ea,#c026d3);color:#fff;box-shadow:0 4px 20px rgba(192,38,211,.3)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(192,38,211,.45)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
  .result-box{background:#0a0812;border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;display:none;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px}
  .result-box.show{display:flex}
  .result-box.success{border-color:#4ade80}
  .result-link{flex:1;color:var(--accent);word-break:break-all}
  .copy-btn{background:var(--border);border:none;border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .copy-btn:hover{background:var(--accent);color:#0d0b12}
  .copy-btn.copied{background:var(--success);color:#0d0b12}
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:12px 20px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--accent);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .preview{background:#0a0812;border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;display:none;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8}
  .preview.show{display:block}
  .preview .v{color:var(--accent)}
  .footer{margin-top:48px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">ZoneHub</div>
  <h1>Macro Share</h1>
  <p class="sub">// Noob Tower Defense · share macros instantly</p>
</div>
<div class="container">
  <div class="card">
    <div class="card-label">Share Your Macro</div>
    <textarea id="jsonInput" placeholder='Paste macro JSON here... {"version":7,"actions":[]}'></textarea>
    <button class="btn btn-primary" id="uploadBtn" onclick="upload()">Generate Share Link</button>
    <div class="result-box" id="result">
      <span class="result-link" id="shareLink"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
    </div>
  </div>
  <div class="divider">or import from link</div>
  <div class="card">
    <div class="card-label">Import Macro</div>
    <input type="text" id="linkInput" placeholder="https://dqtn1206.github.io/ntd-macro-share/?id=...">
    <button class="btn btn-secondary" onclick="fetchMacro()">Fetch & Preview</button>
    <div class="preview" id="preview"></div>
    <button class="btn btn-primary" id="copyJsonBtn" onclick="copyJson()" style="display:none">Copy JSON → Paste into Script</button>
  </div>
</div>
<div class="footer">powered by jsonbin.io · free · no login needed</div>
<div class="toast" id="toast"></div>

<script>
const BIN = 'https://api.jsonbin.io/v3/b'
const BASE = 'https://dqtn1206.github.io/ntd-macro-share/'
let importedJson = null

async function upload() {
  const raw = document.getElementById('jsonInput').value.trim()
  if (!raw) { toast('Paste macro JSON first.'); return }
  let data
  try { data = JSON.parse(raw) } catch(e) { toast('Invalid JSON.'); return }
  if (!data.actions || !data.actions.length) { toast('No actions found.'); return }
  const btn = document.getElementById('uploadBtn')
  btn.disabled = true
  btn.innerHTML = '<span class="spin"></span>Uploading...'
  try {
    const res = await fetch(BIN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Bin-Private': 'false' },
      body: JSON.stringify(data)
    })
    const json = await res.json()
    const id = json.metadata && json.metadata.id
    if (!id) throw new Error('No ID')
    const link = BASE + '?id=' + id
    document.getElementById('shareLink').textContent = link
    document.getElementById('result').className = 'result-box show success'
    toast('Link ready! Copy and share.')
  } catch(e) {
    toast('Upload failed: ' + e.message)
  } finally {
    btn.disabled = false
    btn.textContent = 'Generate Share Link'
  }
}

function copyLink() {
  const link = document.getElementById('shareLink').textContent
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById('copyBtn')
    btn.textContent = 'Copied!'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied') }, 2000)
  })
}

async function fetchMacro() {
  const input = document.getElementById('linkInput').value.trim()
  const match = input.match(/[?&]id=([a-zA-Z0-9]+)/)
  const id = match ? match[1] : (/^[a-zA-Z0-9]{24}$/.test(input) ? input : null)
  if (!id) { toast('Invalid link.'); return }
  try {
    const res = await fetch(BIN + '/' + id + '/latest')
    const json = await res.json()
    const data = json.record
    if (!data || !data.actions) throw new Error('Invalid data')
    importedJson = JSON.stringify(data)
    const t = {}
    data.actions.forEach(a => t[a.type] = (t[a.type]||0)+1)
    const p = document.getElementById('preview')
    p.innerHTML = `<div>Actions: <span class="v">${data.actions.length}</span></div>
<div>Place: <span class="v">${t.place||0}</span> · Upgrade: <span class="v">${t.upgrade||0}</span> · Sell: <span class="v">${t.sell||0}</span></div>
<div>Version: <span class="v">${data.version||'?'}</span></div>`
    p.classList.add('show')
    document.getElementById('copyJsonBtn').style.display = 'block'
    toast('Macro loaded!')
  } catch(e) { toast('Fetch failed: ' + e.message) }
}

function copyJson() {
  if (!importedJson) return
  navigator.clipboard.writeText(importedJson).then(() => {
    const btn = document.getElementById('copyJsonBtn')
    btn.textContent = '✓ Copied! Paste into Import ← Paste JSON'
    setTimeout(() => { btn.textContent = 'Copy JSON → Paste into Script' }, 2500)
  })
}

window.addEventListener('load', () => {
  const id = new URLSearchParams(location.search).get('id')
  if (id) { document.getElementById('linkInput').value = location.href; fetchMacro() }
})

let tt
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2500)
}
</script>
</body>
</html>
